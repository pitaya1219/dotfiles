name: Update Neovim Custom Plugins

on:
  schedule:
    - cron: '0 4 * * 1'  # Every Monday at 4 AM
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-plugins:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: ${{ gitea.repository }}
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Configure git
        run: |
          git config user.name "gitea-actions[bot]"
          git config user.email "gitea-actions[bot]@noreply.git.pitaya.f5.si"

      - name: Update plugins
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GITEA_SERVER_URL: ${{ gitea.server_url }}
          REPO: ${{ gitea.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PLUGINS_FILE="shared/programs/neovim/plugins.nix"

          # Parse all plugins
          PLUGINS_JSON=$(python3 scripts/update-neovim-plugins.py parse "$PLUGINS_FILE")
          echo "Found plugins: $(echo "$PLUGINS_JSON" | jq -r '.[].name' | tr '\n' ' ')"

          # GitHub API helper (authenticated to avoid rate limits)
          github_api() {
            curl -sf \
              ${GITHUB_TOKEN:+-H "Authorization: token ${GITHUB_TOKEN}"} \
              "$@"
          }

          # Process each plugin
          echo "$PLUGINS_JSON" | jq -c '.[]' | while IFS= read -r plugin; do
            NAME=$(echo "$plugin" | jq -r '.name')
            OWNER=$(echo "$plugin" | jq -r '.owner')
            REPO_NAME=$(echo "$plugin" | jq -r '.repo')
            CURRENT_REV=$(echo "$plugin" | jq -r '.rev')

            echo "=== Processing $NAME (current rev: $CURRENT_REV) ==="

            # Determine which branch to check
            if echo "$CURRENT_REV" | grep -qE '^[0-9a-f]{40}$'; then
              # SHA-pinned: check the default branch
              DEFAULT_BRANCH=$(github_api "https://api.github.com/repos/${OWNER}/${REPO_NAME}" | jq -r '.default_branch')
              CHECK_BRANCH="$DEFAULT_BRANCH"
            else
              # Branch-tracking: check that branch
              CHECK_BRANCH="$CURRENT_REV"
            fi

            # Get latest commit SHA on the branch
            LATEST_SHA=$(github_api \
              "https://api.github.com/repos/${OWNER}/${REPO_NAME}/commits/${CHECK_BRANCH}" \
              | jq -r '.sha')

            if [ -z "$LATEST_SHA" ] || [ "$LATEST_SHA" = "null" ]; then
              echo "WARN: Could not fetch latest SHA for $NAME, skipping"
              continue
            fi

            SHORT_SHA="${LATEST_SHA:0:7}"

            # Skip if already at this SHA
            if [ "$CURRENT_REV" = "$LATEST_SHA" ]; then
              echo "SKIP: $NAME is already at $SHORT_SHA"
              continue
            fi

            echo "UPDATE: $NAME $CURRENT_REV -> $LATEST_SHA"

            # Compute new sha256 using nix-prefetch-url (SRI format)
            ARCHIVE_URL="https://github.com/${OWNER}/${REPO_NAME}/archive/${LATEST_SHA}.tar.gz"
            echo "Fetching sha256 for $ARCHIVE_URL..."
            BASE32_HASH=$(nix-prefetch-url --unpack --type sha256 "$ARCHIVE_URL" 2>/dev/null)
            if [ -z "$BASE32_HASH" ]; then
              echo "ERROR: nix-prefetch-url failed for $NAME, skipping"
              continue
            fi
            NEW_SHA256=$(nix hash to-sri --type sha256 "$BASE32_HASH")
            echo "New sha256: $NEW_SHA256"

            # Reset to main before each update
            git checkout main -- "$PLUGINS_FILE"

            # Apply update via Python script (includes validation)
            echo "Applying update..."
            python3 scripts/update-neovim-plugins.py update "$PLUGINS_FILE" "$NAME" "$LATEST_SHA" "$NEW_SHA256"

            # Validate Nix syntax
            echo "Validating Nix syntax..."
            nix-instantiate --parse "$PLUGINS_FILE" > /dev/null

            echo "Validation passed."

            # Create branch and commit
            BRANCH="chore/update-${NAME}-${SHORT_SHA}"
            git checkout -B "$BRANCH"
            git add "$PLUGINS_FILE"
            git commit -m "chore: Update ${NAME} to ${SHORT_SHA}"

            # Push
            git push -f "https://oauth2:${BOT_TOKEN}@$(echo ${GITEA_SERVER_URL} | sed 's|https://||')/${REPO}.git" "$BRANCH"

            # Check for existing PR from this branch
            EXISTING=$(curl -sf \
              -H "Authorization: token ${BOT_TOKEN}" \
              "${GITEA_SERVER_URL}/api/v1/repos/${REPO}/pulls?state=open" \
              | jq -r --arg branch "$BRANCH" '.[] | select(.head.ref == $branch) | .number')

            if [ -n "$EXISTING" ]; then
              echo "PR already exists (#$EXISTING) for $BRANCH, skipping"
            else
              curl -sf -X POST \
                -H "Authorization: token ${BOT_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "$(jq -n \
                  --arg title "chore: Update ${NAME} to ${SHORT_SHA}" \
                  --arg body "Automated update of Neovim plugin \`${NAME}\`.\n\n- **repo**: ${OWNER}/${REPO_NAME}\n- **branch tracked**: ${CHECK_BRANCH}\n- **new SHA**: ${LATEST_SHA}\n\nPart of issue #179." \
                  --arg head "$BRANCH" \
                  '{title:$title, body:$body, head:$head, base:"main"}')" \
                "${GITEA_SERVER_URL}/api/v1/repos/${REPO}/pulls"
              echo "Created PR for $NAME"
            fi

            # Return to main for next iteration
            git checkout main
          done

          echo "Done."