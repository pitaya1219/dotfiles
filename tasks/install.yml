version: '3'

tasks:
  default:
    desc: Install all dependencies
    silent: true
    cmds:
      - task: git
      - task: dropbear
      - task: proot
      - task: bare-termux
      - task: nix
  git:
    desc: Install Git
    silent: true
    cmds:
      - |
        echo "🔧 Installing Git..."
        case "{{.UNAME_S}}" in
          Darwin)
            if ! command -v git >/dev/null 2>&1; then
              if command -v brew >/dev/null 2>&1; then
                brew install git;
              else
                echo "❌ Homebrew not found. Please install Homebrew first or install Git manually.";
                exit 1;
              fi
            else
              echo "✅ Git is already installed";
            fi
            ;;
          Linux)
            if ! command -v git >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                if command -v sudo >/dev/null 2>&1; then
                  sudo apt-get update && sudo apt-get install -y git;
                else
                  echo "⚠️  No sudo access detected. Attempting to install without sudo...";
                  apt-get update && apt-get install -y git || {
                    echo "❌ Failed to install Git without sudo. Please install Git manually or run with sudo access.";
                    exit 1;
                  };
                fi
              else
                echo "❌ Unsupported package manager. Please install Git manually.";
                exit 1;
              fi
            else
              echo "✅ Git is already installed";
            fi
            ;;
          *)
            echo "❌ Unsupported operating system: {{.UNAME_S}}"
            exit 1
            ;;
        esac
  dropbear:
    desc: Install Dropbear (Light Weight SSH)
    silent: true
    cmds:
      - |
        echo "🔧 Installing Dropbear..."
        case "{{.UNAME_S}}" in
          Darwin)
            if ! command -v dropbear >/dev/null 2>&1; then
              echo "❌ Dropbear should be pre-installed on macOS. Please check your system.";
              exit 1;
            else
              echo "✅ Dropbear is already available";
            fi
            ;;
          Linux)
            if ! command -v dropbear >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                if command -v sudo >/dev/null 2>&1; then
                  sudo apt-get update && sudo apt-get install -y dropbear;
                else
                  echo "⚠️  No sudo access detected. Attempting to install without sudo...";
                  apt-get update && apt-get install -y dropbear || {
                    echo "❌ Failed to install Dropbear without sudo. Please install Dropbear manually or run with sudo access.";
                    exit 1;
                  };
                fi
              else
                echo "❌ Unsupported package manager. Please install Dropbear manually.";
                exit 1;
              fi
            else
              echo "✅ Dropbear is already installed";
            fi
            ;;
          *)
            echo "❌ Unsupported operating system: {{.UNAME_S}}"
            exit 1
            ;;
        esac
  proot:
    desc: Install proot (for Termux environments)
    silent: true
    cmds:
      - |
        echo "🔧 Installing proot..."
        case "{{.UNAME_S}}" in
          Darwin)
            echo "⚠️  proot is not needed on macOS";
            ;;
          Linux)
            if [ -n "$TERMUX_VERSION" ] || [ -d "/data/data/com.termux" ]; then
              if ! command -v proot >/dev/null 2>&1; then
                if command -v pkg >/dev/null 2>&1; then
                  pkg update && pkg install -y proot;
                elif command -v apt-get >/dev/null 2>&1; then
                  apt-get update && apt-get install -y proot;
                else
                  echo "❌ No suitable package manager found for proot installation.";
                  exit 1;
                fi
              else
                echo "✅ proot is already installed";
              fi
            else
              echo "⚠️  proot installation skipped (not in Termux environment)";
            fi
            ;;
          *)
            echo "❌ Unsupported operating system: {{.UNAME_S}}"
            exit 1
            ;;
        esac
  termux-packages:
    desc: Install termux-api and termux-services (for Termux environments)
    silent: true
    cmds:
      - |
        echo "🔧 Installing termux-api and termux-services..."
        case "{{.UNAME_S}}" in
          Darwin)
            echo "⚠️  termux-api and termux-services are not needed on macOS";
            ;;
          Linux)
            if [ -n "$TERMUX_VERSION" ] || [ -d "/data/data/com.termux" ]; then
              INSTALLED=0
              if ! command -v termux-battery-status >/dev/null 2>&1; then
                if command -v pkg >/dev/null 2>&1; then
                  pkg update && pkg install -y termux-api;
                  INSTALLED=1
                elif command -v apt-get >/dev/null 2>&1; then
                  apt-get update && apt-get install -y termux-api;
                  INSTALLED=1
                else
                  echo "❌ No suitable package manager found for termux-api installation.";
                  exit 1;
                fi
              else
                echo "✅ termux-api is already installed";
              fi
              if ! command -v sv >/dev/null 2>&1 && ! [ -d "$PREFIX/var/service" ]; then
                if command -v pkg >/dev/null 2>&1; then
                  pkg update && pkg install -y termux-services;
                  INSTALLED=1
                elif command -v apt-get >/dev/null 2>&1; then
                  apt-get update && apt-get install -y termux-services;
                  INSTALLED=1
                else
                  echo "❌ No suitable package manager found for termux-services installation.";
                  exit 1;
                fi
              else
                echo "✅ termux-services is already installed";
              fi
              if [ $INSTALLED -eq 1 ]; then
                echo "";
                echo "⚠️  Please restart Termux to activate termux-services.";
                echo "";
              fi
            else
              echo "⚠️  termux-api and termux-services installation skipped (not in Termux environment)";
            fi
            ;;
          *)
            echo "❌ Unsupported operating system: {{.UNAME_S}}"
            exit 1
            ;;
        esac
  nix:
    desc: Install Nix
    silent: true
    cmds:
      - |
        echo "🔧 Installing Nix package manager..."
        if ! command -v nix >/dev/null 2>&1; then
          echo "📥 Downloading and installing Nix...";
          curl --proto '=https' --tlsv1.2 -L https://nixos.org/nix/install | sh;
          echo "";
          echo "⚠️  Please restart your shell or run:";
          echo "    source ~/.nix-profile/etc/profile.d/nix.sh";
          echo "";
        else
          echo "✅ Nix is already installed";
          nix --version;
        fi
  bare-termux:
    desc: Install rclone and passage for bare Termux (without proot)
    silent: true
    cmds:
      - task: rclone
      - task: passage
      - task: termux-packages
  rclone:
    desc: Install rclone (for bare Termux)
    silent: true
    cmds:
      - |
        echo "🔧 Installing rclone..."
        case "{{.UNAME_S}}" in
          Linux)
            if ! command -v rclone >/dev/null 2>&1; then
              if [ -n "$TERMUX_VERSION" ] || [ -d "/data/data/com.termux" ]; then
                if command -v pkg >/dev/null 2>&1; then
                  pkg update && pkg install -y rclone;
                elif command -v apt-get >/dev/null 2>&1; then
                  apt-get update && apt-get install -y rclone;
                else
                  echo "❌ No suitable package manager found.";
                  exit 1;
                fi
              else
                echo "❌ This task is for Termux environments only.";
                exit 1;
              fi
            else
              echo "✅ rclone is already installed";
            fi
            ;;
          *)
            echo "❌ Unsupported operating system: {{.UNAME_S}}"
            exit 1
            ;;
        esac
  passage:
    desc: Install passage (for bare Termux)
    silent: true
    cmds:
      - |
        echo "🔧 Installing passage..."
        case "{{.UNAME_S}}" in
          Linux)
            if ! command -v passage >/dev/null 2>&1; then
              if [ -n "$TERMUX_VERSION" ] || [ -d "/data/data/com.termux" ]; then
                if command -v pkg >/dev/null 2>&1; then
                  pkg update && pkg install -y passage;
                elif command -v apt-get >/dev/null 2>&1; then
                  apt-get update && apt-get install -y passage;
                else
                  echo "❌ No suitable package manager found.";
                  exit 1;
                fi
              else
                echo "❌ This task is for Termux environments only.";
                exit 1;
              fi
            else
              echo "✅ passage is already installed";
            fi
            ;;
          *)
            echo "❌ Unsupported operating system: {{.UNAME_S}}"
            exit 1
            ;;
        esac
  check-deps:
    desc: Check if all dependencies are installed
    silent: true
    cmds:
      - |
        echo "🔍 Checking dependencies..."
        echo -n "Git: "
        if command -v git >/dev/null 2>&1; then
          echo "✅ $(git --version)";
        else
          echo "❌ Not installed";
        fi
        echo -n "Dropbear: "
        if command -v dropbear >/dev/null 2>&1; then
          echo "✅ $(dropbear --version 2>&1 | head -n1)";
        else
          echo "❌ Not installed";
        fi
        echo -n "proot: "
        if [ -n "$TERMUX_VERSION" ] || [ -d "/data/data/com.termux" ]; then
          if command -v proot >/dev/null 2>&1; then
            echo "✅ $(proot --version 2>&1 | head -n1)";
          else
            echo "❌ Not installed";
          fi
        else
          echo "⚠️  Not needed (not in Termux)";
        fi
        echo -n "Nix: "
        if command -v nix >/dev/null 2>&1; then
          echo "✅ $(nix --version)";
        else
          echo "❌ Not installed";
        fi
        echo -n "rclone: "
        if command -v rclone >/dev/null 2>&1; then
          echo "✅ $(rclone --version 2>&1 | head -n1)";
        else
          echo "❌ Not installed";
        fi
        echo -n "passage: "
        if command -v passage >/dev/null 2>&1; then
          echo "✅ Installed";
        else
          echo "❌ Not installed";
        fi
        echo -n "termux-api: "
        if [ -n "$TERMUX_VERSION" ] || [ -d "/data/data/com.termux" ]; then
          if command -v termux-battery-status >/dev/null 2>&1; then
            echo "✅ Installed";
          else
            echo "❌ Not installed";
          fi
        else
          echo "⚠️  Not needed (not in Termux)";
        fi
        echo -n "termux-services: "
        if [ -n "$TERMUX_VERSION" ] || [ -d "/data/data/com.termux" ]; then
          if command -v sv >/dev/null 2>&1 || [ -d "$PREFIX/var/service" ]; then
            echo "✅ Installed";
          else
            echo "❌ Not installed";
          fi
        else
          echo "⚠️  Not needed (not in Termux)";
        fi
