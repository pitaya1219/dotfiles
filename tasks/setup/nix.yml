version: '3'

tasks:
  default:
    desc: Setup nix
    silent: true
    cmds:
      - task: flake
      - task: home
  flake:
    desc: Setup flake
    silent: true
    vars:
      NIX_DIR:
        sh: printf "${HOME}/.config/nix"
      NIX_CONF_PATH: "{{.NIX_DIR}}/nix.conf"
    cmds:
      - |
        echo "❄️ Setup flake..."
        if ! test -d {{.NIX_DIR}}; then
          echo "{{.NIX_DIR}} not found."
          echo "Create {{.NIX_DIR}}."
          mkdir -p "{{.NIX_DIR}}"
        fi
        if ! test -f {{.NIX_CONF_PATH}}; then
          echo "{{.NIX_CONF_PATH}} not found."
          echo "Create {{.NIX_CONF_PATH}}."
          touch "{{.NIX_CONF_PATH}}"
        fi
        if grep -q 'experimental-features = nix-command flakes' "{{.NIX_CONF_PATH}}"; then
          echo "✅ Flakes already enabled";
        else
          echo 'experimental-features = nix-command flakes' >> "{{.NIX_CONF_PATH}}"
        fi
        for setting in \
          "substituters = https://cache.nixos.org https://nix-community.cachix.org" \
          "trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCUSeBs="; do
          if ! grep -qF "$setting" "{{.NIX_CONF_PATH}}"; then
            echo "$setting" >> "{{.NIX_CONF_PATH}}"
            echo "✅ Added setting: $setting"
          fi
        done
        if uname -r 2>/dev/null | grep -qi "proot"; then
          # post-build-hook cleans /homeless-shelter after each build so the next
          # build doesn't see it and refuse to start (sandbox=false behaviour).
          # max-jobs=1 ensures builds are sequential so the hook doesn't race.
          HOOK="{{.NIX_DIR}}/post-build-hook.sh"
          if [ ! -f "$HOOK" ]; then
            printf '#!/bin/sh\nrm -rf /homeless-shelter 2>/dev/null || true\n' > "$HOOK"
            chmod +x "$HOOK"
            echo "✅ Created post-build-hook: $HOOK"
          fi
          for setting in \
            "sandbox = false" \
            "filter-syscalls = false" \
            "ssl-cert-file = /etc/ssl/certs/ca-certificates.crt" \
            "post-build-hook = {{.NIX_DIR}}/post-build-hook.sh" \
            "max-jobs = 1" \
            "cores = 1"; do
            if ! grep -qF "$setting" "{{.NIX_CONF_PATH}}"; then
              echo "$setting" >> "{{.NIX_CONF_PATH}}"
              echo "✅ Added proot setting: $setting"
            fi
          done
        fi
  home:
    desc: Setup nix home-manager (or nix-darwin on macOS) and switch profile
    silent: true
    vars:
      PROFILE: '{{.PROFILE | default ""}}'
    cmds:
      - |
        echo "❄️ Setup home..."
        if [ -n "{{.PROFILE}}" ]; then
          profile="{{.PROFILE}}"
          echo "Using profile: $profile"
        else
          depth_opt=$(find --help 2>/dev/null | grep -q GNU && echo '-maxdepth 1' || echo '-depth 1')
          select profile in $(
            find profiles ${depth_opt} -name "*.nix" | xargs -I {} basename {} .nix
          ); do
            if [ -n "$profile" ]; then
              echo "Using profile: $profile"
            else
              echo "⚠️ Invalid selection. Please try again."
            fi
            break
          done
        fi
        if [ -n "$profile" ]; then
          if [ -f ~/.nix-profile/etc/profile.d/nix.sh ]; then
            source ~/.nix-profile/etc/profile.d/nix.sh
          fi
          if uname -r 2>/dev/null | grep -qi "proot"; then
            # Nix bundles its own libcurl which may not find system certs in proot.
            # Point it to the system CA bundle explicitly.
            export NIX_SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
            # Nix sets HOME=/homeless-shelter during sandbox=false builds. If a prior
            # build failed and left the directory, the next build refuses to proceed.
            rm -rf /homeless-shelter 2>/dev/null || true
          fi
          if [[ "$(uname)" == "Darwin" ]] && [[ -f "profiles/${profile}/darwin.nix" ]]; then
            task setup:nix:darwin PROFILE="${profile}"
          else
            nix run home-manager/master -- switch --flake .#"${profile}"
          fi
        fi

  darwin:
    desc: Bootstrap or switch nix-darwin profile (macOS only)
    silent: true
    vars:
      PROFILE: '{{.PROFILE | default ""}}'
    cmds:
      - |
        profile="{{.PROFILE}}"
        if [ -z "$profile" ]; then
          echo "⚠️ PROFILE is required"
          exit 1
        fi
        echo "🍎 Setup nix-darwin for profile: $profile"
        # Bootstrap Netskope CA cert into the running nix daemon BEFORE building.
        # Two things are needed:
        #   1. ssl-cert-file in nix.conf — for the daemon's own libcurl (binary cache fetches)
        #   2. NIX_SSL_CERT_FILE in daemon LaunchDaemon env — for impureEnvVars in fixed-output
        #      derivations (e.g. fetchCargoVendor). The daemon reads impureEnvVars from its OWN
        #      environment, not from the calling user. nix-darwin persists this via
        #      launchd.daemons.nix-daemon.serviceConfig.EnvironmentVariables after a successful
        #      switch; this bootstrap handles the chicken-and-egg on first run.
        _NETSKOPE_CERT="/Library/Application Support/Netskope/STAgent/data/nscacert_combined.pem"
        _PLIST="/Library/LaunchDaemons/org.nixos.nix-daemon.plist"
        _NEED_RESTART=0
        if [[ -f "$_NETSKOPE_CERT" ]]; then
          # 1. ssl-cert-file in nix.conf (daemon's own libcurl for binary cache fetches)
          if ! grep -qF "ssl-cert-file" /etc/nix/nix.conf 2>/dev/null; then
            echo "🔐 Pre-configuring ssl-cert-file in /etc/nix/nix.conf..."
            echo "ssl-cert-file = $_NETSKOPE_CERT" | sudo tee -a /etc/nix/nix.conf > /dev/null
            _NEED_RESTART=1
          fi
          # 2. NIX_SSL_CERT_FILE for build sandboxes (via impureEnvVars in fetchCargoVendor etc.)
          #
          # WHY we need a Nix store path (not the /Library/... path directly):
          #   - nss-cacert's setup hook does `test -r "$NIX_SSL_CERT_FILE"` and silently
          #     falls back to the bundled nss-cacert (no Netskope CA) if the file is not
          #     readable inside the build sandbox.
          #   - /Library/Application Support/... is outside the sandbox → readability fails
          #     → nixpkgs-patched certifi ends up with the bundled CA bundle (no Netskope CA)
          #     → requests SSL verification fails against the Netskope MITM cert.
          #   - /nix/store/... IS readable inside sandboxes, so adding the cert to the
          #     store and using the store path avoids the silent fallback.
          echo "🔐 Staging Netskope cert into Nix store for sandbox access..."
          _STORE_CERT=$(nix-store --add-fixed sha256 "$_NETSKOPE_CERT" 2>/dev/null || true)
          if [[ -z "$_STORE_CERT" ]]; then
            echo "⚠️  nix-store --add-fixed failed; builds may still fail SSL verification"
            _STORE_CERT="$_NETSKOPE_CERT"
          else
            echo "    Store path: $_STORE_CERT"
          fi
          if [[ -f "$_PLIST" ]]; then
            _CURRENT_NIX_SSL=$(sudo /usr/libexec/PlistBuddy \
              -c "Print :EnvironmentVariables:NIX_SSL_CERT_FILE" "$_PLIST" 2>/dev/null)
            if [[ "$_CURRENT_NIX_SSL" != "$_STORE_CERT" ]]; then
              echo "🔐 Updating NIX_SSL_CERT_FILE in nix-daemon plist (was: ${_CURRENT_NIX_SSL:-<unset>})..."
              sudo /usr/libexec/PlistBuddy -c "Add :EnvironmentVariables dict" "$_PLIST" 2>/dev/null || true
              sudo /usr/libexec/PlistBuddy \
                -c "Delete :EnvironmentVariables:NIX_SSL_CERT_FILE" "$_PLIST" 2>/dev/null || true
              sudo /usr/libexec/PlistBuddy \
                -c "Add :EnvironmentVariables:NIX_SSL_CERT_FILE string '$_STORE_CERT'" "$_PLIST"
              _NEED_RESTART=1
            fi
          fi
          if [[ "$_NEED_RESTART" == "1" ]]; then
            # bootout removes the service from launchd's database so that
            # bootstrap re-reads the plist from disk — kickstart only restarts
            # the process and does NOT pick up EnvironmentVariables changes.
            echo "Reloading nix-daemon (bootout + bootstrap to pick up plist changes)..."
            sudo launchctl bootout system/org.nixos.nix-daemon 2>/dev/null || true
            sudo launchctl bootstrap system "$_PLIST"
            echo "Waiting for nix-daemon to be ready..."
            for i in $(seq 1 20); do
              nix store ping &>/dev/null && break || sleep 1
            done
          fi
        fi
        # darwin-rebuild (and nix run nix-darwin) always require root for system activation.
        # Capture binary path before sudo as sudo may have a restricted PATH.
        if command -v darwin-rebuild &>/dev/null; then
          DARWIN_REBUILD=$(command -v darwin-rebuild)
          echo "Running darwin-rebuild switch (sudo required)..."
          sudo "$DARWIN_REBUILD" switch --flake .#"${profile}"
        else
          NIX_BIN=$(command -v nix)
          echo "darwin-rebuild not found, bootstrapping via nix run (sudo required)..."
          sudo "$NIX_BIN" --extra-experimental-features "nix-command flakes" run nix-darwin -- switch --flake .#"${profile}"
        fi
