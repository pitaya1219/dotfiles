version: '3'

# Syncs secrets between pass-cli (Proton Pass CLI) and passage (local age-encrypted
# store). The actual work happens in scripts/pass-cli-passage-sync.sh.
#
# Login is automated: the secrets:login task attempts a non-interactive login
# using a PAT stored at proton-pass/__USER__/pass-cli-pat. If no PAT is found,
# it tells the human to log in interactively and run secrets:login:rotate-pat.

vars:
  PASS_CLI_PAT_PATH: '{{.PASS_CLI_PAT_PATH | default "proton-pass/__USER__/pass-cli-pat"}}'

tasks:
  login:
    desc: "Auto-login to pass-cli using PAT stored in passage"
    silent: true
    vars:
      PASS_CLI_PAT_PATH: '{{.PASS_CLI_PAT_PATH | default "proton-pass/__USER__/pass-cli-pat"}}'
    cmds:
      - |
        bash <<'EOF'
        set -euo pipefail
        # Already logged in — no-op, do not touch passage
        if pass-cli test >/dev/null 2>&1; then
          exit 0
        fi
        # Try to read PAT from passage
        pat_path="{{.PASS_CLI_PAT_PATH}}"
        # Replace __USER__ placeholder with actual USER value
        pat_path="${pat_path//__USER__/$USER}"
        if ! pat=$(passage show "$pat_path" 2>/dev/null); then
          echo "pass-cli is not logged in and no PAT found at passage path \"$pat_path\"." >&2
          echo 'Bootstrap once: run `pass-cli login` interactively, then run:' >&2
          echo '  task secrets:login:rotate-pat' >&2
          exit 1
        fi
        # Login with PAT (--pat only supports argv, not stdin — unavoidable exception)
        pass-cli login --pat "$pat" >/dev/null 2>&1
        # Verify login succeeded
        if ! pass-cli test >/dev/null 2>&1; then
          echo "pass-cli login --pat failed. The PAT at \"$pat_path\" may have expired or been revoked." >&2
          echo 'Re-bootstrap: run `pass-cli login` interactively, then run:' >&2
          echo '  task secrets:login:rotate-pat' >&2
          exit 1
        fi
        echo "Logged in to pass-cli via PAT from passage (path: $pat_path)" >&2
        EOF

  login:rotate-pat:
    desc: "Create and store a new PAT for automated pass-cli login"
    silent: true
    vars:
      PASS_CLI_PAT_PATH: '{{.PASS_CLI_PAT_PATH | default "proton-pass/__USER__/pass-cli-pat"}}'
      PASS_CLI_PAT_NAME: '{{.PASS_CLI_PAT_NAME | default "dotfiles-auto-login"}}'
      PASS_CLI_PAT_EXPIRATION: '{{.PASS_CLI_PAT_EXPIRATION | default "1y"}}'
      PASS_CLI_VAULT: '{{.PASS_CLI_VAULT | default "Passage"}}'
    preconditions:
      - sh: 'bash -c "pass-cli test >/dev/null 2>&1"'
        msg: "pass-cli must be already logged in (run `pass-cli login` first)."
      - sh: 'bash -c "pass-cli info 2>/dev/null | grep -q Username"'
        msg: "pass-cli is currently authenticated via a PAT session, not an interactive one. A PAT session cannot grant access to itself or create new PATs — run `pass-cli login` interactively first."
    cmds:
      - |
        bash <<'EOF'
        set -euo pipefail
        pat_path="{{.PASS_CLI_PAT_PATH}}"
        pat_name="{{.PASS_CLI_PAT_NAME}}"
        pat_expiration="{{.PASS_CLI_PAT_EXPIRATION}}"
        pat_vault="{{.PASS_CLI_VAULT}}"
        # Replace __USER__ placeholder with actual USER value
        pat_path="${pat_path//__USER__/$USER}"
        # Create PAT and capture JSON output
        json=$(pass-cli personal-access-token create --name "$pat_name" --expiration "$pat_expiration" --output json 2>&1)
        # "env_var" is the actual token value (format pst_<token>::<key>, ready
        # to pass to `pass-cli login --pat`); "pat_id" is just the PAT's id,
        # not a secret. Verified against a live `pass-cli personal-access-token
        # create --output json` response. Older/plausible key names are kept
        # as a defensive fallback in case the CLI's JSON shape changes.
        token=$(printf '%s' "$json" | jq -r '.env_var // .token // .personal_access_token // .pat // .secret // .value // empty')
        pat_id=$(printf '%s' "$json" | jq -r '.pat_id // .id // empty')
        if [ -z "$token" ] || [ -z "$pat_id" ]; then
          # Do NOT print raw JSON (may contain secret). Print only keys for diagnostics.
          keys=$(printf '%s' "$json" | jq -r 'keys_unsorted[]' 2>/dev/null || echo "(failed to parse JSON)")
          echo "Failed to extract PAT token/id from pass-cli output." >&2
          echo "Actual JSON keys found: $keys" >&2
          echo "Update the jq filter in secrets:login:rotate-pat if the key names are different." >&2
          exit 1
        fi
        # A freshly created PAT has no vault access by default. The grant must
        # be at vault scope, not item scope: an item-scoped grant lets the PAT
        # read/write that one item, but `pass-cli vault list` / `item view
        # --vault-name` (name-based lookup, as used by pass-cli-passage-sync.sh)
        # still can't resolve the vault by name under an item-only grant
        # (verified live — item-scoped grant alone left `vault list` empty and
        # `item view --vault-name` failing with "Could not find vault").
        # "editor" is required (not "viewer") because pull/push/sync also
        # write fields via `pass-cli item update`. Access grants can only be
        # made from an interactive session (enforced by the precondition
        # above), never from a PAT session — that's why this can't happen
        # inside secrets:login.
        #
        # Grant by --personal-access-token-id, not --personal-access-token-name:
        # this task doesn't enforce name uniqueness, so re-running it (e.g.
        # after a first attempt failed) leaves multiple PATs sharing the same
        # name, and name-based grant lookup then fails outright with a generic
        # "NotAllowed" error (verified live) instead of picking one. The id
        # from this creation response is always unambiguous.
        if ! grant_err=$(pass-cli personal-access-token access grant --personal-access-token-id "$pat_id" --vault-name "$pat_vault" --role editor 2>&1); then
          echo "Created PAT '$pat_name' but failed to grant it access to vault=$pat_vault:" >&2
          echo "$grant_err" >&2
          echo "It will not be usable for sync until access is granted (pass-cli personal-access-token access grant --personal-access-token-id \"$pat_id\" --vault-name \"$pat_vault\" --role editor)." >&2
          exit 1
        fi
        # Store token in passage (never printed)
        printf '%s' "$token" | passage insert --echo --force "$pat_path" >/dev/null 2>&1
        echo "New PAT stored at passage path: $pat_path" >&2
        EOF

  pull:
    desc: "Sync secrets: pass-cli -> passage"
    silent: true
    cmds:
      - task: login
      - ./scripts/pass-cli-passage-sync.sh pull {{.CLI_ARGS}}

  push:
    desc: "Sync secrets: passage -> pass-cli"
    silent: true
    cmds:
      - task: login
      - ./scripts/pass-cli-passage-sync.sh push {{.CLI_ARGS}}

  sync:
    desc: "Sync secrets: bidirectional (passage <-> pass-cli)"
    silent: true
    cmds:
      - task: login
      - ./scripts/pass-cli-passage-sync.sh sync {{.CLI_ARGS}}

  sync:test:
    desc: Dry run for bidirectional secrets sync
    silent: true
    cmd:
      task: sync
      vars:
        CLI_ARGS: '--dry-run {{.CLI_ARGS}}'
