version: '3'

# Syncs secrets between pass-cli (Proton Pass CLI) and passage (local age-encrypted
# store). The actual work happens in scripts/pass-cli-passage-sync.sh; this wraps it
# with a `pass-cli test` precondition that fails fast with a pointer to
# `pass-cli login` when not authenticated.

tasks:
  pull:
    desc: "Sync secrets: pass-cli -> passage"
    preconditions:
      - sh: 'pass-cli test'
        msg: "pass-cli is not logged in. Run `pass-cli login`"
    cmd: ./scripts/pass-cli-passage-sync.sh pull {{.CLI_ARGS}}

  push:
    desc: "Sync secrets: passage -> pass-cli"
    preconditions:
      - sh: 'pass-cli test'
        msg: "pass-cli is not logged in. Run `pass-cli login`"
    cmd: ./scripts/pass-cli-passage-sync.sh push {{.CLI_ARGS}}

  sync:
    desc: "Sync secrets: bidirectional (passage <-> pass-cli)"
    preconditions:
      - sh: 'pass-cli test'
        msg: "pass-cli is not logged in. Run `pass-cli login`"
    cmd: ./scripts/pass-cli-passage-sync.sh sync {{.CLI_ARGS}}

  sync:test:
    desc: Dry run for bidirectional secrets sync
    cmd:
      task: sync
      vars:
        CLI_ARGS: '--dry-run {{.CLI_ARGS}}'
