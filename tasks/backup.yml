version: '3'

# Aliases for sync:up variants — kept for backward compatibility.
# For down/bisync variants, use sync:down:* and sync:bisync:* directly.
#
# BACKUP_REMOVED_FILE: if set, its value is passed as --backup-dir to preserve
# files that would be deleted. Leave unset for a plain sync without backup dir.

tasks:
  backup:
    desc: Sync local → remote. Set BACKUP_REMOVED_FILE=<path> to preserve deleted files.
    requires:
      vars: [SOURCE_DIR, DIST_DIR, REMOTE]
    cmd: |
      if [ -n '{{.BACKUP_REMOVED_FILE}}' ]; then
        task sync:up \
          SOURCE_DIR='{{.SOURCE_DIR}}' \
          DIST_DIR='{{.DIST_DIR}}' \
          REMOTE='{{.REMOTE}}' \
          EXCLUDE='{{.EXCLUDE}}' \
          -- --backup-dir='{{.BACKUP_REMOVED_FILE}}' {{.CLI_ARGS}}
      else
        task sync:up \
          SOURCE_DIR='{{.SOURCE_DIR}}' \
          DIST_DIR='{{.DIST_DIR}}' \
          REMOTE='{{.REMOTE}}' \
          EXCLUDE='{{.EXCLUDE}}' \
          -- {{.CLI_ARGS}}
      fi

  backup:test:
    desc: Dry run for backup (alias for sync:up:test)
    cmd:
      task: sync:up:test

  backup:encrypted:
    desc: Encrypted sync. Set BACKUP_REMOVED_FILE=<path> to preserve deleted files.
    requires:
      vars: [SOURCE_DIR, ENCRYPT_SUBDIR]
    cmd: |
      if [ -n '{{.BACKUP_REMOVED_FILE}}' ]; then
        task sync:up:encrypted \
          SOURCE_DIR='{{.SOURCE_DIR}}' \
          ENCRYPT_SUBDIR='{{.ENCRYPT_SUBDIR}}' \
          EXCLUDE='{{.EXCLUDE}}' \
          -- --backup-dir='{{.BACKUP_REMOVED_FILE}}' {{.CLI_ARGS}}
      else
        task sync:up:encrypted \
          SOURCE_DIR='{{.SOURCE_DIR}}' \
          ENCRYPT_SUBDIR='{{.ENCRYPT_SUBDIR}}' \
          EXCLUDE='{{.EXCLUDE}}' \
          -- {{.CLI_ARGS}}
      fi

  backup:encrypted:test:
    desc: Dry run for encrypted backup
    cmd:
      task: sync:up:encrypted:test

  backup:pcloud:
    desc: pcloud encrypted sync. Set BACKUP_REMOVED_FILE=<path> to preserve deleted files.
    requires:
      vars: [SOURCE_DIR, ENCRYPT_SUBDIR]
    cmd: |
      if [ -n '{{.BACKUP_REMOVED_FILE}}' ]; then
        task sync:up:pcloud \
          SOURCE_DIR='{{.SOURCE_DIR}}' \
          ENCRYPT_SUBDIR='{{.ENCRYPT_SUBDIR}}' \
          PARENT_DIR='{{.PARENT_DIR}}' \
          EXCLUDE='{{.EXCLUDE}}' \
          -- --backup-dir='{{.BACKUP_REMOVED_FILE}}' {{.CLI_ARGS}}
      else
        task sync:up:pcloud \
          SOURCE_DIR='{{.SOURCE_DIR}}' \
          ENCRYPT_SUBDIR='{{.ENCRYPT_SUBDIR}}' \
          PARENT_DIR='{{.PARENT_DIR}}' \
          EXCLUDE='{{.EXCLUDE}}' \
          -- {{.CLI_ARGS}}
      fi

  backup:pcloud:test:
    desc: Dry run for pcloud backup
    cmd:
      task: sync:up:pcloud:test
